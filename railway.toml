# Railway deploy config. On Railway, env vars are injected directly into the
# process, so we run node without --env-file (the gitignored config/.env does
# not exist in the deploy). Local `npm start` still uses --env-file via package.json.
[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
